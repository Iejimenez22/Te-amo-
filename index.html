<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>¿Quieres intentar algo conmigo? 💜</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="caja">

        <h1>
            ¿Quieres intentar algo conmigo? 💜
        </h1>

        <div class="botones">

            <button id="si">
                Sí 💖
            </button>

            <button id="no">
                No
            </button>

        </div>

    </div>


    <!-- Música -->
    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
        Tu navegador no soporta audio.
    </audio>


    <!-- Imagen sorpresa al deslizar -->
    <div class="snoopy">

        <img src="Snoopy.png" alt="Snoopy">

    </div>


    <script src="java.js"></script>

</body>

</html>
